<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | Gabriel Jones</title>

  <style>
    /* =========================
   GABRIEL JONES ADMIN UI
   FULL CUSTOM THEME
   ========================= */

:root{
  --primary:#0047BB;
  --accent:#FF3E3E;
  --surface:#F9F7F2;
  --dark:#05162E;
  --yellow:#FFD43B;
  --border:2px solid #05162E;
}

/* RESET TOTALE CMS */
html, body {
  margin:0 !important;
  padding:0 !important;
  background:var(--surface) !important;
  font-family:'Outfit', sans-serif !important;
}

/* TOP BAR */
.nc-appHeader {
  background:var(--surface) !important;
  border-bottom:var(--border) !important;
  box-shadow:none !important;
}

.nc-appHeader h1 {
  font-family:'Fraunces' !important;
  font-weight:900 !important;
  color:var(--dark) !important;
}

/* SIDEBAR (COLLECTIONS) */
aside {
  background:white !important;
  border-right:var(--border) !important;
  box-shadow:none !important;
}

/* COLLECTION LIST */
.css-1r6n5jg-Root,
.css-1f3b5g5-Root {
  background:white !important;
  border-radius:0 !important;
}

/* CARD BLOG (LISTA POST) */
[class*="Card"],
[class*="card"] {
  border:var(--border) !important;
  border-radius:0 !important;
  box-shadow:none !important;
  background:white !important;
  transition:0.25s;
}

[class*="Card"]:hover {
  transform:translate(-6px,-6px);
  box-shadow:10px 10px 0 var(--yellow);
}

/* BUTTONS */
button {
  border:var(--border) !important;
  border-radius:0 !important;
  background:var(--primary) !important;
  color:white !important;
  font-weight:900 !important;
  font-family:'Outfit' !important;
  transition:0.3s;
}

button:hover {
  background:var(--dark) !important;
}

/* INPUTS */
input, textarea, select {
  border:var(--border) !important;
  border-radius:0 !important;
  box-shadow:none !important;
  font-family:'Outfit' !important;
}

/* EDITOR AREA FULL STYLE */
.nc-entryEditor {
  background:var(--surface) !important;
}

/* REMOVE “APP FEEL” */
.nc-app,
.nc-root {
  max-width:100% !important;
}

/* WATERMARK (COME IL TUO SITO) */
body::after {
  content:"GJ";
  position:fixed;
  font-size:20rem;
  font-weight:900;
  opacity:0.03;
  right:-60px;
  bottom:-80px;
  font-family:'Fraunces';
  pointer-events:none;
}

/* LINKS */
a {
  color:var(--primary) !important;
  font-weight:800;
}

a:hover {
  color:var(--accent) !important;
}

/* LIST ITEMS */
li {
  font-weight:600;
}

/* REMOVE RADIUS OVUNQUE */
* {
  border-radius:0 !important;
}
  </style>
</head>

<body>
  <div id="nc-root"></div>

  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  <script>
    CMS.init();
  </script>
</body>
</html>
