<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | Gabriel Jones</title>

  <!-- FONT (stesso sito) -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Outfit:wght@300;600;800&family=Homemade+Apple&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #0047BB;
      --accent: #FF3E3E;
      --surface: #F9F7F2;
      --dark: #05162E;
      --yellow: #FFD43B;
      --border: 2px solid #05162E;
    }

    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background: var(--surface);
      color: var(--dark);
    }

    /* HEADER STYLE SIMILE AL SITO */
    .admin-header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 18px 5%;
      background: var(--surface);
      border-bottom: var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .logo-box {
      background: var(--primary);
      color: white;
      font-weight: 900;
      padding: 6px 14px;
      border: var(--border);
    }

    .title {
      font-family: 'Fraunces';
      font-size: 1.2rem;
      font-weight: 900;
    }

    /* WRAPPER CMS */
    #nc-root {
      margin-top: 80px;
    }

    /* PERSONALIZZAZIONE CMS UI */
    .nc-appHeader {
      background: var(--primary) !important;
      color: white !important;
      border-bottom: var(--border) !important;
    }

    .nc-appHeader h1 {
      font-family: 'Fraunces' !important;
      font-weight: 900 !important;
    }

    .nc-entryEditor {
      background: var(--surface) !important;
    }

    /* BOTTONI */
    button {
      border-radius: 0 !important;
      border: var(--border) !important;
      font-weight: 900 !important;
      font-family: 'Outfit' !important;
    }

    /* SIDEBAR */
    .css-1r6n5jg-Root, .css-1f3b5g5-Root {
      background: white !important;
      border-right: var(--border) !important;
    }

    /* CAMPI */
    input, textarea {
      border: var(--border) !important;
      border-radius: 0 !important;
      font-family: 'Outfit' !important;
    }

    /* WATERMARK STYLE */
    .watermark {
      position: fixed;
      font-size: 18rem;
      font-weight: 900;
      opacity: 0.03;
      bottom: -60px;
      right: -40px;
      font-family: 'Fraunces';
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div class="admin-header">
    <div class="logo-box">GJ</div>
    <div class="title">ADMIN PANEL</div>
    <div style="font-weight:800; font-size:0.8rem;">Gabriel Jones CMS</div>
  </div>

  <div class="watermark">GJ</div>

  <!-- NETLIFY CMS -->
  <div id="nc-root"></div>

  <!-- Netlify CMS -->
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

  <!--
  <script>
    CMS.init();

    CMS.registerPreviewStyle("/assets/admin-preview.css");
  </script>
 -->
</body>
</html>
