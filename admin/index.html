<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin | GJ</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#0047BB;
  --accent:#FF3E3E;
  --surface:#F9F7F2;
  --dark:#05162E;
  --yellow:#FFD43B;
  --border:2px solid #05162E;
}

/* RESET TOTALE CMS UI */
html, body {
  margin:0;
  padding:0;
  background:var(--surface);
  font-family:'Outfit',sans-serif;
}

/* elimina effetto "app CMS" */
#nc-root {
  height:100vh;
}

/* TOP BAR CMS */
.nc-appHeader {
  background:var(--surface) !important;
  border-bottom:var(--border) !important;
  box-shadow:none !important;
}

.nc-appHeader h1 {
  font-family:'Fraunces' !important;
  font-weight:900 !important;
  color:var(--dark) !important;
}

/* SIDEBAR = stile sito */
.css-1r6n5jg-Root,
.css-1f3b5g5-Root,
aside {
  background:white !important;
  border-right:var(--border) !important;
  box-shadow:none !important;
}

/* LISTE COLLEZIONI */
.css-1hvrgvd-CollectionTopRow {
  font-weight:900 !important;
}

.css-1y4p8pa {
  border-radius:0 !important;
}

/* BOTTONI */
button {
  border:var(--border) !important;
  border-radius:0 !important;
  background:var(--primary) !important;
  color:white !important;
  font-weight:900 !important;
  font-family:'Outfit';
  transition:0.3s;
}

button:hover {
  background:var(--dark) !important;
}

/* CARDS BLOG */
.css-1f0hpgt-Card,
.css-1q8dd3e-Card {
  border:var(--border) !important;
  border-radius:0 !important;
  box-shadow:none !important;
  background:white !important;
  transition:0.3s;
}

.css-1f0hpgt-Card:hover {
  transform:translate(-4px,-4px);
  box-shadow:8px 8px 0 var(--yellow);
}

/* FORM EDITOR */
input, textarea, select {
  border:var(--border) !important;
  border-radius:0 !important;
  font-family:'Outfit' !important;
  box-shadow:none !important;
}

/* elimina “effetto app contenuta” */
.nc-entryEditor {
  background:var(--surface) !important;
  padding:0 !important;
}

/* FULL WIDTH EXPERIENCE */
.nc-app,
.nc-root,
.nc-container {
  max-width:100% !important;
}

/* WATERMARK STILE TUO SITO */
body::after {
  content:"GJ";
  position:fixed;
  font-size:18rem;
  font-weight:900;
  opacity:0.03;
  right:-40px;
  bottom:-60px;
  font-family:'Fraunces';
  pointer-events:none;
}

/* RIMOZIONE “APP FEEL” */
.nc-appHeader, .nc-appHeader * {
  border-radius:0 !important;
}
</style>
</head>

<body>

<div id="nc-root"></div>

<script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
<script>
CMS.init();
</script>

</body>
</html>
