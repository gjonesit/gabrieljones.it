<div style="clear: both; display: block; width: 100%;"></div>

<main class="post-layout-wrapper">
    <div class="post-centered-container">
        
        <article class="post-main-content">
            <header class="post-header-area">
                <span class="category-badge">{% if page.categories.size > 0 %}{{ page.categories | first }}{% else %}Journal{% endif %}</span>
                <h1 class="entry-title">{{ page.title }}</h1>
                
                <div class="entry-meta-grid">
                    <div class="meta-box">
                        <span class="label">DATA</span> 
                        <span class="value">{{ page.date | date: "%d.%m.%Y" }}</span>
                    </div>
                    {% if page.author %}
                    <div class="meta-box">
                        <span class="label">AUTORE</span> 
                        <span class="value">{{ page.author }}</span>
                    </div>
                    {% endif %}
                </div>
            </header>

            <div class="black-divider"></div>

            <section class="markdown-content">
                {{ content }}
            </section>

            <footer class="entry-footer">
                <a href="{{ site.baseurl }}/" class="retro-back-button">
                    <span class="icon">←</span> TORNA ALLA HOME
                </a>
            </footer>
        </article>

    </div>
</main>

<style>
    /* 1. RESET TOTALE PER LA PAGINA POST */
    .post-layout-wrapper {
        position: relative;
        width: 100vw;
        left: 0;
        right: 0;
        margin-top: 180px; /* Spazio vitale per la navbar fixed */
        background-color: var(--surface);
        display: flex;
        justify-content: center; /* Centra orizzontalmente */
        z-index: 10;
    }

    .post-centered-container {
        width: 100%;
        max-width: 1400px; /* Stessa larghezza della tua .container della home */
        padding: 0 5%;
        display: flex;
        justify-content: center;
    }

    .post-main-content {
        width: 100%;
        max-width: 850px; /* Larghezza ottimale per la lettura */
        text-align: left;
    }

    /* 2. TITOLO E META */
    .category-badge {
        display: inline-block;
        background: var(--accent);
        color: white;
        padding: 4px 12px;
        font-weight: 900;
        font-size: 0.7rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 20px;
    }

    .entry-title {
        font-family: 'Fraunces', serif;
        font-size: clamp(2.5rem, 8vw, 5rem);
        line-height: 0.9;
        letter-spacing: -2px;
        color: var(--dark);
        margin: 0 0 40px 0;
    }

    .entry-meta-grid {
        display: flex;
        gap: 40px;
        border-top: var(--border);
        padding-top: 20px;
    }

    .meta-box .label {
        color: var(--primary);
        font-weight: 900;
        font-size: 0.7rem;
        display: block;
    }

    .meta-box .value {
        font-weight: 800;
        font-size: 0.9rem;
    }

    .black-divider {
        height: 6px;
        background: var(--dark);
        width: 100%;
        margin: 40px 0;
    }

    /* 3. MARKDOWN CONTENT (Il cuore del post) */
    .markdown-content {
        font-size: 1.25rem;
        line-height: 1.6;
        color: var(--dark);
    }

    .markdown-content p { margin-bottom: 1.8rem; }
    
    .markdown-content h2 {
        font-family: 'Fraunces', serif;
        font-size: 2.8rem;
        margin: 4rem 0 1.5rem;
        line-height: 1;
    }

    .markdown-content blockquote {
        background: var(--yellow);
        border: var(--border);
        padding: 40px;
        margin: 50px 0;
        font-family: 'Fraunces';
        font-size: 1.8rem;
        font-weight: 700;
        box-shadow: 10px 10px 0 var(--dark);
    }

    .markdown-content img {
        width: 100%;
        height: auto;
        border: var(--border);
        box-shadow: 15px 15px 0 var(--primary);
        margin: 3rem 0;
    }

    /* 4. BOTTONE INDIETRO */
    .entry-footer {
        margin: 100px 0;
        padding-top: 40px;
        border-top: var(--border);
    }

    .retro-back-button {
        display: inline-flex;
        align-items: center;
        gap: 15px;
        font-weight: 900;
        color: var(--dark);
        transition: 0.3s;
    }

    .retro-back-button .icon {
        background: var(--primary);
        color: white;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: var(--border);
    }

    .retro-back-button:hover .icon {
        background: var(--accent);
        transform: translateX(-10px);
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
        .post-layout-wrapper { margin-top: 120px; }
        .entry-title { font-size: 3.5rem; }
    }
</style>
