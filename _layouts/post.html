---
layout: base
---
<article class="post-container">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%d %B %Y" }}
      </time>
      {% if page.author %}
        • <span class="post-author">{{ page.author }}</span>
      {% endif %}
      {% if page.categories.size > 0 %}
        • <span class="post-categories">{{ page.categories | join: ", " }}</span>
      {% endif %}
    </div>
  </header>

  <section class="post-content">
    {{ content }}
  </section>

  <footer class="post-footer">
    <a href="{{ "/" | relative_url }}" class="back-link">← Torna alla Home</a>
  </footer>
</article>

<style>
  /* Stile Integrato per il Post */
  .post-container {
    max-width: 740px;
    margin: 40px auto;
    padding: 0 20px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.8;
    color: #292929;
  }

  .post-header {
    margin-bottom: 40px;
    text-align: center;
  }

  .post-title {
    font-size: 2.5rem;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 10px;
    color: #1a1a1a;
  }

  .post-meta {
    font-size: 0.95rem;
    color: #757575;
    font-weight: 400;
  }

  .post-content {
    font-size: 1.15rem;
    word-wrap: break-word;
  }

  /* Gestione Immagini */
  .post-content img {
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    margin: 2rem 0;
  }

  /* Tipografia contenuti */
  .post-content h2, .post-content h3 {
    margin-top: 2.5rem;
    color: #1a1a1a;
  }

  .post-content p {
    margin-bottom: 1.5rem;
  }

  .post-content blockquote {
    border-left: 4px solid #2563eb;
    padding-left: 20px;
    margin: 30px 0;
    font-style: italic;
    color: #555;
  }

  .post-content code {
    background: #f1f1f1;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
  }

  .post-footer {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid #eee;
  }

  .back-link {
    text-decoration: none;
    color: #2563eb;
    font-weight: 600;
    transition: opacity 0.2s;
  }

  .back-link:hover {
    opacity: 0.7;
    text-decoration: underline;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .post-title {
      font-size: 1.8rem;
    }
    .post-content {
      font-size: 1.05rem;
    }
  }
</style>
